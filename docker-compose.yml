services:
  postgres:
    image: postgres:16-alpine
    container_name: watchvault-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: watchvault
      POSTGRES_PASSWORD: watchvault
      POSTGRES_DB: watchvault_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U watchvault -d watchvault_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
